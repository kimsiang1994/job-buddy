name: Tests

# Deliberately separate from watch-deepseek-docs.yml. That workflow is a monthly
# SENSOR against live docs; this one is a gate on every change. Bolting the test
# suite onto a cron job means it runs twelve times a year -- which is how 86
# tests came to exist without ever having run in CI.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install the package
        run: python -m pip install -e .

      # Discovery runs every suite in tests/, so a new file is picked up
      # automatically -- no list to forget to update. test_deepseek.py defines
      # plain functions rather than TestCases, so it is not collected: it needs
      # a real API key and costs money.
      - name: Offline test suites
        run: python -m unittest discover -s tests -t . -v

      # The package must import with no optional dependency installed. The
      # search pipeline is stdlib-only by design, and a missing wheel must
      # never be able to block it.
      - name: Core imports with no optional dependencies
        run: |
          python -c "
          from jobbuddy import pipeline, scoring, job_store, net, source_mcf, job_schema
          print('core imports clean')
          "
